<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vox Bridge</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0e0e0e;
                --surface: #161616;
                --border: #2a2a2a;
                --text: #e8e2d9;
                --muted: #5a5550;
                --accent: #c8a97e;
                --danger: #a05a5a;
                --green: #6a9e7a;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "DM Mono", monospace;
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 100;
            }

            .card {
                width: min(420px, 92vw);
                background: var(--surface);
                border: 1px solid var(--border);
                padding: 48px 44px 44px;
                display: flex;
                flex-direction: column;
                gap: 36px;
                position: relative;
            }

            .logo {
                font-family: "Cormorant Garamond", serif;
                font-size: 30px;
                font-weight: 300;
                letter-spacing: 0.12em;
            }
            .logo span {
                color: var(--accent);
            }
            .tagline {
                margin-top: 4px;
                font-size: 10px;
                letter-spacing: 0.2em;
                color: var(--muted);
                text-transform: uppercase;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 11px;
                letter-spacing: 0.1em;
                color: var(--muted);
            }
            .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--muted);
                transition:
                    background 0.4s,
                    box-shadow 0.4s;
                flex-shrink: 0;
            }
            .dot.live {
                background: var(--green);
                box-shadow: 0 0 8px var(--green);
                animation: pulse 2s ease-in-out infinite;
            }
            .dot.connecting {
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
                animation: pulse 0.8s ease-in-out infinite;
            }
            .dot.error {
                background: var(--danger);
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.35;
                }
            }

            .volume-section {
                display: flex;
                flex-direction: column;
                gap: 12px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.4s;
                height: 0;
                overflow: hidden;
            }
            .volume-section.visible {
                opacity: 1;
                pointer-events: all;
                height: auto;
            }
            .vol-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .vol-label {
                font-size: 9px;
                letter-spacing: 0.2em;
                color: var(--muted);
                text-transform: uppercase;
            }
            .vol-value {
                font-size: 11px;
                color: var(--accent);
            }

            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                height: 2px;
                background: var(--border);
                outline: none;
                cursor: pointer;
            }
            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--accent);
                cursor: pointer;
                transition:
                    transform 0.15s,
                    box-shadow 0.15s;
            }
            input[type="range"]::-webkit-slider-thumb:hover {
                transform: scale(1.3);
                box-shadow: 0 0 10px rgba(200, 169, 126, 0.4);
            }
            input[type="range"]::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border: none;
                border-radius: 50%;
                background: var(--accent);
                cursor: pointer;
            }

            .actions {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            button {
                width: 100%;
                padding: 13px;
                border: 1px solid var(--border);
                background: transparent;
                color: var(--text);
                font-family: "DM Mono", monospace;
                font-size: 11px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    color 0.2s,
                    background 0.2s;
            }
            button.primary {
                border-color: var(--accent);
                color: var(--accent);
            }
            button.primary:hover {
                background: rgba(200, 169, 126, 0.08);
            }
            button.danger {
                border-color: var(--danger);
                color: var(--danger);
                display: none;
            }
            button.danger:hover {
                background: rgba(160, 90, 90, 0.08);
            }
            button.secondary {
                border-color: var(--muted);
                color: var(--muted);
                display: none;
                font-size: 10px;
                padding: 10px;
            }
            button.secondary:hover {
                border-color: var(--text);
                color: var(--text);
            }
            button:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            .error-bar {
                font-size: 10px;
                letter-spacing: 0.05em;
                color: var(--danger);
                padding: 8px 0;
                display: none;
            }
            .error-bar.visible {
                display: block;
            }

            .footer {
                position: absolute;
                bottom: 16px;
                right: 20px;
                font-size: 9px;
                letter-spacing: 0.15em;
                color: #2a2a2a;
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div>
                <div class="logo">VOX <span>BRIDGE</span></div>
                <div class="tagline">Traducción en tiempo real</div>
            </div>

            <div class="status">
                <div class="dot" id="dot"></div>
                <span id="status-text">Desconectado</span>
            </div>

            <div class="volume-section" id="vol-section">
                <div class="vol-row">
                    <span class="vol-label">Volumen</span>
                    <span class="vol-value" id="vol-display">100%</span>
                </div>
                <input
                    type="range"
                    id="vol-slider"
                    min="0"
                    max="1"
                    step="0.01"
                    value="1"
                />
            </div>

            <div class="error-bar" id="error-bar"></div>

            <div class="actions">
                <button class="primary" id="btn-connect">Conectar</button>
                <button class="danger" id="btn-disc">Desconectar</button>
                <button class="secondary" id="btn-refresh">
                    ↻ Actualizar dispositivo de audio
                </button>
            </div>

            <div class="footer">v1.0.0 — alpha</div>
        </div>

        <!-- AudioWorklet processor inline (from working debug.html) -->
        <script id="worklet-src" type="x-worklet">
            const RING = 32768, PREBUF = 2048;
            class P extends AudioWorkletProcessor {
              constructor() {
                super();
                this._buf = new Float32Array(RING);
                this._w = 0; this._r = 0; this._ready = false;
                this.port.onmessage = e => {
                  if (e.data.type === 'clear') { this._w = this._r = 0; this._ready = false; return; }
                  const s = e.data.samples;
                  for (let i = 0; i < s.length; i++) { this._buf[this._w] = s[i]; this._w = (this._w + 1) % RING; }
                  if (!this._ready && this._avail >= PREBUF) this._ready = true;
                };
              }
              get _avail() { return (this._w - this._r + RING) % RING; }
              process(_, outputs) {
                const out = outputs[0][0], len = out.length;
                if (!this._ready) { out.fill(0); }
                else if (this._avail >= len) { for (let i=0;i<len;i++) { out[i]=this._buf[this._r]; this._r=(this._r+1)%RING; } }
                else { out.fill(0); this._ready = false; }
                return true;
              }
            }
            registerProcessor('asp', P);
        </script>

        <script>
            "use strict";

            // ── Constants (must match server) ─────────────────────────────
            const SERVER_SAMPLE_RATE = 44100;
            const PREBUFFER_CHUNKS = 4;
            const SP_RING_SIZE = 32768;

            // ── State ─────────────────────────────────────────────────────
            let ws = null;
            let audioCtx = null;
            let gainNode = null;
            let workletNode = null;
            let scriptNode = null;
            let useWorklet = false;
            let muted = false;
            let userDisconnected = false;
            let reconnectTimer = null;
            let wakeLock = null;

            // ScriptProcessor ring buffer (fallback)
            const spRing = new Float32Array(SP_RING_SIZE);
            let spWrite = 0,
                spRead = 0,
                spReady = false,
                spChunkCount = 0;

            // ── Elements ──────────────────────────────────────────────────

            const $dot = document.getElementById("dot");
            const $stTxt = document.getElementById("status-text");
            const $btnConn = document.getElementById("btn-connect");
            const $btnDisc = document.getElementById("btn-disc");
            const $volSec = document.getElementById("vol-section");
            const $volSldr = document.getElementById("vol-slider");
            const $volDisp = document.getElementById("vol-display");
            const $errBar = document.getElementById("error-bar");
            const $btnRefresh = document.getElementById("btn-refresh");

            // ── UI helpers ────────────────────────────────────────────────
            function setStatus(state, text) {
                $dot.className = "dot" + (state ? " " + state : "");
                $stTxt.textContent = text;
            }

            function setConnected(yes) {
                $btnConn.style.display = yes ? "none" : "block";
                $btnDisc.style.display = yes ? "block" : "none";
                $btnRefresh.style.display = yes ? "block" : "none";
                $volSec.classList.toggle("visible", yes);
            }

            function showError(msg) {
                $errBar.textContent = msg || "";
                $errBar.classList.toggle("visible", !!msg);
            }

            // ── Wake lock ─────────────────────────────────────────────────
            async function acquireWakeLock() {
                if (!("wakeLock" in navigator)) return;
                try {
                    wakeLock = await navigator.wakeLock.request("screen");
                } catch (_) {}
            }
            function releaseWakeLock() {
                if (wakeLock) {
                    wakeLock.release();
                    wakeLock = null;
                }
            }
            // Re-acquire if tab comes back to foreground while connected
            document.addEventListener("visibilitychange", () => {
                if (
                    document.visibilityState === "visible" &&
                    ws &&
                    ws.readyState === WebSocket.OPEN
                )
                    acquireWakeLock();
            });

            // ── Auto-reconnect on page focus ──────────────────────────────
            document.addEventListener("visibilitychange", () => {
                if (
                    document.visibilityState === "visible" &&
                    !userDisconnected &&
                    (!ws || ws.readyState !== WebSocket.OPEN)
                ) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = setTimeout(connect, 1000);
                }
            });

            // ── Volume ────────────────────────────────────────────────────
            $volSldr.addEventListener("input", () => {
                const v = parseFloat($volSldr.value);
                $volDisp.textContent = Math.round(v * 100) + "%";
                if (gainNode && !muted) gainNode.gain.value = v;
            });

            // ── Audio init ────────────────────────────────────────────────
            async function initAudio() {
                // FIX-1: force sample rate to match server — prevents pitch shift
                audioCtx = new AudioContext({
                    sampleRate: SERVER_SAMPLE_RATE,
                    latencyHint: "interactive",
                });
                gainNode = audioCtx.createGain();
                gainNode.gain.value = muted ? 0 : parseFloat($volSldr.value);
                gainNode.connect(audioCtx.destination);

                // FIX-3: AudioWorklet needs HTTPS or localhost — fallback to ScriptProcessor on HTTP
                if (audioCtx.audioWorklet) {
                    const src =
                        document.getElementById("worklet-src").textContent;
                    const blob = new Blob([src], {
                        type: "application/javascript",
                    });
                    const burl = URL.createObjectURL(blob);
                    await audioCtx.audioWorklet.addModule(burl);
                    URL.revokeObjectURL(burl);
                    workletNode = new AudioWorkletNode(audioCtx, "asp");
                    workletNode.connect(gainNode);
                    useWorklet = true;
                } else {
                    // ScriptProcessor fallback
                    const bufSize = 2048;
                    scriptNode = audioCtx.createScriptProcessor(bufSize, 0, 1);
                    scriptNode.connect(gainNode);
                    spWrite = spRead = spChunkCount = 0;
                    spReady = false;
                    scriptNode.onaudioprocess = (e) => {
                        const out = e.outputBuffer.getChannelData(0);
                        const avail =
                            (spWrite - spRead + SP_RING_SIZE) % SP_RING_SIZE;
                        if (!spReady || avail < out.length) {
                            out.fill(0);
                            if (avail < out.length) {
                                spReady = false;
                                spChunkCount = 0;
                            }
                            return;
                        }
                        for (let i = 0; i < out.length; i++) {
                            out[i] = spRing[spRead];
                            spRead = (spRead + 1) % SP_RING_SIZE;
                        }
                    };
                    useWorklet = false;
                }
            }

            function feedAudio(f32) {
                if (useWorklet) {
                    // FIX-2: pre-buffering handled inside worklet
                    workletNode.port.postMessage(
                        { type: "chunk", samples: f32 },
                        [f32.buffer],
                    );
                } else {
                    for (let i = 0; i < f32.length; i++) {
                        spRing[spWrite] = f32[i];
                        spWrite = (spWrite + 1) % SP_RING_SIZE;
                    }
                    // FIX-2 fallback: wait for N chunks before starting playback
                    if (!spReady && ++spChunkCount >= PREBUFFER_CHUNKS)
                        spReady = true;
                }
            }

            function teardownAudio() {
                workletNode?.disconnect();
                workletNode = null;
                scriptNode?.disconnect();
                scriptNode = null;
                gainNode?.disconnect();
                gainNode = null;
                audioCtx?.close();
                audioCtx = null;
                spReady = false;
                spWrite = spRead = spChunkCount = 0;
            }

            // ── Connect ───────────────────────────────────────────────────
            async function connect() {
                // Guard: prevent double connection
                if (
                    ws &&
                    (ws.readyState === WebSocket.CONNECTING ||
                        ws.readyState === WebSocket.OPEN)
                )
                    return;

                userDisconnected = false;
                showError(null);
                setStatus("connecting", "Conectando…");
                $btnConn.disabled = true;

                try {
                    await initAudio();
                    audioCtx.resume();
                } catch (err) {
                    setStatus("error", "Error de audio");
                    showError(err.message);
                    $btnConn.disabled = false;
                    return;
                }

                const url = `ws://${location.hostname}:8765`;
                ws = new WebSocket(url);
                ws.binaryType = "arraybuffer";

                ws.onopen = async () => {
                    setStatus("live", "En vivo");
                    setConnected(true);
                    $btnConn.disabled = false;
                    await acquireWakeLock();
                };

                ws.onmessage = (e) => {
                    if (typeof e.data === "string") return; // config message — ignore
                    const i16 = new Int16Array(e.data);
                    const f32 = new Float32Array(i16.length);
                    for (let i = 0; i < i16.length; i++)
                        f32[i] = i16[i] / 32768;
                    feedAudio(f32);
                };

                ws.onclose = (e) => {
                    setStatus("", "Desconectado");
                    setConnected(false);
                    $btnConn.disabled = false;
                    releaseWakeLock();
                    teardownAudio();
                    ws = null;
                    if (!userDisconnected) {
                        setStatus("", "Reconectando…");
                        reconnectTimer = setTimeout(connect, 3000);
                    }
                };

                ws.onerror = () => {
                    showError(
                        "No se pudo conectar. Verifica la IP y que el servidor esté corriendo.",
                    );
                    $btnConn.disabled = false;
                };
            }

            // ── Refresh audio device ─────────────────────────────────
            // Recreates AudioContext so browser picks up newly connected devices (e.g. bluetooth headset)
            $btnRefresh.addEventListener("click", async () => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                teardownAudio();
                try {
                    await initAudio();
                    audioCtx.resume();
                    setStatus("live", "En vivo");
                } catch (err) {
                    showError("Error al actualizar audio: " + err.message);
                }
            });

            // ── Disconnect ────────────────────────────────────────────────
            $btnDisc.addEventListener("click", () => {
                userDisconnected = true;
                clearTimeout(reconnectTimer);
                releaseWakeLock();
                if (ws) {
                    ws.close(1000);
                    ws = null;
                }
                teardownAudio();
                setStatus("", "Desconectado");
                setConnected(false);
            });

            $btnConn.addEventListener("click", connect);
        </script>
    </body>
</html>
